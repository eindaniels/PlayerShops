name: Build & Release Dev

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

permissions:
  contents: write

jobs:
  build:
    name: Build PlayerShops
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 25 ────────────────────────────────────────────────────────────
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      # ── Gradle wrapper permissions ──────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # ── Short commit hash ───────────────────────────────────────────────────
      - name: Get short commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build with Gradle (shadowJar)
        run: ./gradlew shadowJar -Pplugin_version="1.0-${{ steps.vars.outputs.sha_short }}"

      # ── Collect JARs ────────────────────────────────────────────────────────
      # Falls mehrere JARs entstehen (z.B. für verschiedene MC-Versionen),
      # werden sie zu einer ZIP gebündelt. Ansonsten nur das einzelne JAR.
      - name: Collect & bundle JARs
        id: bundle
        run: |
          mkdir -p artifacts
          find build/libs -name "*.jar" -not -name "*-all.jar" | head -20 | xargs -I{} cp {} artifacts/ || true
          JAR_COUNT=$(find artifacts -name "*.jar" | wc -l)
          echo "jar_count=$JAR_COUNT" >> $GITHUB_OUTPUT

          if [ "$JAR_COUNT" -gt 1 ]; then
            cd artifacts
            zip "../PlayerShops-dev-${{ steps.vars.outputs.sha_short }}.zip" *.jar
            cd ..
            echo "artifact_path=PlayerShops-dev-${{ steps.vars.outputs.sha_short }}.zip" >> $GITHUB_OUTPUT
          else
            SINGLE_JAR=$(find artifacts -name "*.jar" | head -1)
            cp "$SINGLE_JAR" "PlayerShops-dev-${{ steps.vars.outputs.sha_short }}.jar"
            echo "artifact_path=PlayerShops-dev-${{ steps.vars.outputs.sha_short }}.jar" >> $GITHUB_OUTPUT
          fi

      # ── Upload artifact (immer, auch bei PRs) ────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlayerShops-dev-${{ steps.vars.outputs.sha_short }}
          path: ${{ steps.bundle.outputs.artifact_path }}
          retention-days: 30